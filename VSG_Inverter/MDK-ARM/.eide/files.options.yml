##########################################################################################
#                        Append Compiler Options For Source Files
##########################################################################################

# syntax:
#   <your pattern>: <compiler options>
# For get pattern syntax, please refer to: https://www.npmjs.com/package/micromatch
#
# examples:
#   'main.cpp':           --cpp11 -Og ...
#   'src/*.c':            -gnu -O2 ...
#   'src/lib/**/*.cpp':   --cpp11 -Os ...
#   '!Application/*.c':   -O0
#   '**/*.c':             -O2 -gnu ...

version: "2.1"
options:
    VSG_Inverter:
        files: {}
        virtualPathFiles:
            <virtual_root>/Drivers/STM32G4xx_HAL_Driver/stm32g4xx_ll_cordic.c: ""
            <virtual_root>/Drivers/STM32G4xx_HAL_Driver/stm32g4xx_ll_fmac.c: ""
            <virtual_root>/Drivers/STM32G4xx_HAL_Driver/stm32g4xx_ll_usart.c: ""
            <virtual_root>/Middlewares/FreeRTOS/port.c: ""
